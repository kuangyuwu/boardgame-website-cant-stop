<!DOCTYPE html>

                    <div class="space"></div>

                </div>
            </div>
            <div class="path-outer">
                <div class="path-inner">
                    <div class="space"></div>
                    <div class="space"></div>
                    <div class="space"></div>
                </div>
                <div class="path-name-outer">
                    <div class="path-name">12</div>
                </div>
            </div>
        </div>
        <div id="scoreboard">
            <div class="player-outer">
                <div class="player">player</div>
            </div>
            <div class="player-outer">
                <div class="player">player</div>
            </div>
        </div>

</html>
